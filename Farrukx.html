<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farrukx | Digital Card</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #050a18;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-blue: #3b82f6;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        /* Profile Section */
        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 20px;
            margin-bottom: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-blue);
            padding: 5px;
        }

        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 15px;
            height: 15px;
            background: #22c55e;
            border-radius: 50%;
            border: 3px solid var(--bg-color);
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .bio {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Bento Links */
        .links-grid {
            display: grid;
            gap: 12px;
            animation: slideUp 1s ease-out;
        }

        .link-item {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-item:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }

        .link-item i {
            margin-right: 15px;
            color: var(--accent-blue);
        }

        .link-item span {
            font-weight: 500;
            font-size: 15px;
        }

        .link-item .arrow {
            margin-left: auto;
            opacity: 0.3;
        }

        /* Footer Button */
        .save-btn {
            margin-top: 30px;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            width: 100%;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-card">
            <div class="avatar-container">
                <img src="me.jpg" alt="Farrukx" class="avatar">
                <div class="status-dot"></div>
            </div>
            <h1>Farrukx</h1>
            <p class="bio">Digital Enthusiast & Content Creator</p>
        </div>

        <div class="links-grid">
            <a href="https://t.me/phonzzzy" class="link-item">
                <i data-lucide="send"></i>
                <span>Telegram Private</span>
                <i data-lucide="chevron-right" class="arrow"></i>
            </a>

            <a href="https://t.me/someonessssz" class="link-item">
                <i data-lucide="message-circle"></i>
                <span>Telegram Channel</span>
                <i data-lucide="chevron-right" class="arrow"></i>
            </a>

            <a href="https://www.instagram.com/yesiminterested?igsh=MXhrZGJmcWpxaTN3Mg==" class="link-item">
                <i data-lucide="instagram"></i>
                <span>Instagram</span>
                <i data-lucide="chevron-right" class="arrow"></i>
            </a>
        </div>

        <button class="save-btn" onclick="window.print()">
            Vizitkani saqlash
        </button>
    </div>

    <script>
        // Ikonkalarni yuklash
        lucide.createIcons();

        // Tugma bosilganda yengil tebranish (Mobil qurilmalar uchun)
        document.querySelectorAll('.link-item').forEach(button => {
            button.addEventListener('click', () => {
                if (navigator.vibrate) navigator.vibrate(10);
            });
        });
    </script>
</body>
</html>
